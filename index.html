<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Yusf</title>

  <!-- Google Fonts: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #fff;
      --text: #000;
      --accent: #000;
      --link-hover: #555;
      --settings-bg: rgba(255, 255, 255, 0.9);
      --border: #ddd;
    }

    @media (prefers-color-scheme: dark) {
      .auto-theme {
        --bg: #111;
        --text: #eee;
        --accent: #fff;
        --link-hover: #aaa;
        --settings-bg: rgba(30, 30, 30, 0.95);
        --border: #444;
      }
    }

    body.auto-theme {
      background-color: var(--bg);
      color: var(--text);
    }

    body.manual-light {
      background-color: #fff;
      color: #000;
    }

    body.manual-dark {
      background-color: #111;
      color: #eee;
    }

    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-family: 'Inter', sans-serif;
      transition: background-color 0.3s, color 0.3s;
      cursor: default;
    }

    h1 {
      font-size: 5rem;
      font-weight: 700;
      margin: 0;
      color: var(--accent);
    }

    p.link {
      color: var(--text);
      opacity: 0.7;
      margin-top: 0.5rem;
      font-size: 1.1rem;
      text-decoration: none;
      border-bottom: 1px solid var(--text);
      padding-bottom: 2px;
      transition: opacity 0.3s;
    }

    p.link:hover {
      opacity: 1;
      cursor: pointer;
    }

    .settings-icon {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 28px;
      height: 28px;
      color: var(--text);
      opacity: 0.6;
      transition: opacity 0.3s, transform 0.2s;
      cursor: pointer;
      z-index: 100;
    }

    .settings-icon:hover {
      opacity: 1;
      transform: rotate(45deg);
    }

    .settings-panel {
      position: absolute;
      top: 52px;
      right: 16px;
      width: 200px;
      background: var(--settings-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      padding: 12px 0;
      font-size: 0.95rem;
      color: var(--text);
      z-index: 100;
      display: none;
    }

    .settings-option {
      padding: 8px 16px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .settings-option:hover {
      background: rgba(0, 0, 0, 0.05);
    }

    .settings-option.active {
      color: #667eea;
      font-weight: 600;
    }
  </style>
</head>
<body class="auto-theme">

  <!-- Dişli Ayarlar İkonu -->
  <div class="settings-icon" onclick="toggleSettings()">⚙️</div>

  <!-- Ayarlar Paneli -->
  <div id="settingsPanel" class="settings-panel">
    <div class="settings-option active" data-lang="en" onclick="setLang('en')">English</div>
    <div class="settings-option" data-lang="ru" onclick="setLang('ru')">Русский</div>
    <div class="settings-option" data-lang="az" onclick="setLang('az')">Azərbaycanca</div>

    <div class="settings-divider" style="height: 1px; background: var(--border); margin: 8px 0;"></div>

    <div class="settings-option active" data-theme="auto" onclick="setTheme('auto')">Auto Theme</div>
    <div class="settings-option" data-theme="light" onclick="setTheme('light')">Light Mode</div>
    <div class="settings-option" data-theme="dark" onclick="setTheme('dark')">Dark Mode</div>
  </div>

  <!-- Ana İçerik -->
  <h1>Yusf</h1>
  <p class="link" onclick="window.location.href='https://yusifmuradliroot.github.io/easylink/'">easylink</p>

  <script>
    // Dil çevirileri
    const translations = {
      en: { link: "easylink" },
      ru: { link: "easylink" },
      az: { link: "easylink" }
    };

    // Ayarlar menüsünü aç/kapat
    function toggleSettings() {
      const panel = document.getElementById("settingsPanel");
      panel.style.display = panel.style.display === "block" ? "none" : "block";
    }

    // Tıklama dışında kapatma
    window.onclick = function(event) {
      const icon = document.querySelector(".settings-icon");
      const panel = document.getElementById("settingsPanel");
      if (!icon.contains(event.target) && !panel.contains(event.target)) {
        panel.style.display = "none";
      }
    }

    // Dil ayarı
    function setLang(lang) {
      document.querySelectorAll('.settings-option[data-lang]').forEach(el => {
        el.classList.remove('active');
      });
      document.querySelector(`.settings-option[data-lang="${lang}"]`).classList.add('active');
      localStorage.setItem('preferred-lang', lang);
      updateContent();
    }

    // Tema ayarı
    function setTheme(theme) {
      document.querySelectorAll('.settings-option[data-theme]').forEach(el => {
        el.classList.remove('active');
      });
      document.querySelector(`.settings-option[data-theme="${theme}"]`).classList.add('active');
      localStorage.setItem('preferred-theme', theme);
      applyTheme();
    }

    // Temayı uygula
    function applyTheme() {
      const theme = localStorage.getItem('preferred-theme') || 'auto';
      document.body.className = theme === 'auto' ? 'auto-theme' : 'manual-' + theme;
    }

    // İçeriği güncelle
    function updateContent() {
      const lang = localStorage.getItem('preferred-lang') || 'en';
      const trans = translations[lang];
      document.querySelector('.link').textContent = trans.link;
    }

    // Sayfa yüklendiğinde ayarları yükle
    window.onload = function() {
      const savedLang = localStorage.getItem('preferred-lang') || 'en';
      const savedTheme = localStorage.getItem('preferred-theme') || 'auto';

      // Dil ayarını yükle
      document.querySelectorAll('.settings-option[data-lang]').forEach(el => {
        el.classList.toggle('active', el.dataset.lang === savedLang);
      });

      // Tema ayarını yükle
      document.querySelectorAll('.settings-option[data-theme]').forEach(el => {
        el.classList.toggle('active', el.dataset.theme === savedTheme);
      });

      applyTheme();
      updateContent();
    };
  </script>

</body>
</html>
